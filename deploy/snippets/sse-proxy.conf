# SSE (Server-Sent Events) proxy settings
# Include this snippet in any location block that serves SSE streams.
# The including block must still define: proxy_pass, proxy_http_version,
# proxy_set_header Host, and any other location-specific headers.

proxy_set_header Connection '';
proxy_buffering off;
proxy_cache off;
chunked_transfer_encoding off;
add_header X-Accel-Buffering no;
proxy_connect_timeout 60s;
proxy_send_timeout 300s;
proxy_read_timeout 300s;
