services:
  frontend:
    build:
      context: ..
      dockerfile: deploy/docker/frontend.Dockerfile
    ports:
      - "${FRONTEND_BIND_HOST:-127.0.0.1}:${FRONTEND_BIND_PORT:-18081}:80"
    depends_on:
      - api-proxy
      - judge-server
    restart: unless-stopped

  api-proxy:
    build:
      context: ..
      dockerfile: deploy/docker/api-proxy.Dockerfile
    env_file:
      - ./.env
    environment:
      JUDGE_BASE_URL: http://judge-server:3002
    extra_hosts:
      - "cdnapi.cornna.xyz:host-gateway"
      - "api.cornna.xyz:host-gateway"
    volumes:
      - api_proxy_data:/app/data
    restart: unless-stopped

  judge-server:
    build:
      context: ..
      dockerfile: deploy/docker/judge-server.Dockerfile
    env_file:
      - ./.env
    environment:
      JUDGE_HOST: 0.0.0.0
    read_only: true
    tmpfs:
      - /tmp:exec,mode=1777,size=256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    restart: unless-stopped

volumes:
  api_proxy_data:
